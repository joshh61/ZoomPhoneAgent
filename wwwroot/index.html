<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blu J Zoom Phone Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a5e 50%, #2d1b69 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        /* Header - matches Blu J Command Center */
        .header {
            background: linear-gradient(90deg, #1a0a8a, #2d1b9e);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #4a3aff;
            flex-shrink: 0;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4a3aff, #7c6aff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .header-subtitle {
            font-size: 11px;
            color: #a0a0ff;
            margin-top: 1px;
        }

        .status-badge {
            margin-left: auto;
            background: #1a5c1a;
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.disconnected {
            background: #5c1a1a;
            color: #f87171;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e8e8ff;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #2a1a9e, #3d2db8);
            border: 1px solid #4a3aff;
            color: #ffffff;
        }

        .message.error {
            align-self: flex-start;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
        }

        .message.welcome {
            align-self: center;
            text-align: center;
            background: rgba(74, 58, 255, 0.15);
            border: 1px solid rgba(74, 58, 255, 0.3);
            max-width: 500px;
            color: #c0c0ff;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            display: none;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #7c6aff;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Input area */
        .input-container {
            padding: 12px 24px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
        }

        #messageInput {
            flex: 1;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            border-color: #4a3aff;
        }

        #messageInput::placeholder {
            color: #808099;
        }

        #sendButton {
            padding: 10px 20px;
            background: linear-gradient(135deg, #2a1a9e, #4a3aff);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #sendButton:hover { opacity: 0.9; }
        #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Quick action chips */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .chip {
            padding: 5px 12px;
            background: rgba(74, 58, 255, 0.15);
            border: 1px solid rgba(74, 58, 255, 0.3);
            border-radius: 16px;
            color: #a0a0ff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: rgba(74, 58, 255, 0.3);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">📞</div>
        <div>
            <div class="header-title">Zoom Phone Assistant</div>
            <div class="header-subtitle">Blu J Command Center</div>
        </div>
        <div class="status-badge" id="statusBadge">Connecting...</div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message welcome">
            <strong>Welcome to the Zoom Phone Assistant</strong><br><br>
            I can help you look up users, extensions, call queues, phone numbers, call logs, devices, and more.
            Just ask in plain English!
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Ask about Zoom Phone (e.g., 'Who has extension 6245?')" autocomplete="off">
            <button id="sendButton">Send</button>
        </div>
        <div class="quick-actions">
            <span class="chip" onclick="sendQuick('List all call queues')">Call Queues</span>
            <span class="chip" onclick="sendQuick('Show offline devices')">Offline Devices</span>
            <span class="chip" onclick="sendQuick('What phone numbers are unassigned?')">Available Numbers</span>
            <span class="chip" onclick="sendQuick('Show missed calls from the last 7 days')">Missed Calls</span>
            <span class="chip" onclick="sendQuick('List all sites')">Sites</span>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusBadge = document.getElementById('statusBadge');

        let conversationHistory = [];

        // Check API health on load
        async function checkHealth() {
            try {
                const res = await fetch('/api/health');
                if (res.ok) {
                    statusBadge.textContent = 'Connected';
                    statusBadge.className = 'status-badge';
                } else {
                    throw new Error('API not healthy');
                }
            } catch {
                statusBadge.textContent = 'Disconnected';
                statusBadge.className = 'status-badge disconnected';
            }
        }
        checkHealth();

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage(text) {
            if (!text.trim()) return;

            addMessage('user', text);
            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userMessage: text,
                        messages: conversationHistory
                    })
                });

                if (!res.ok) throw new Error(`Server error: ${res.status}`);

                const data = await res.json();
                addMessage('assistant', data.reply);

                conversationHistory.push({ role: 'user', content: text });
                conversationHistory.push({ role: 'assistant', content: data.reply });

                // Keep history manageable (last 20 messages)
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }
            } catch (err) {
                addMessage('error', `Error: ${err.message}. Please try again.`);
            } finally {
                typingIndicator.style.display = 'none';
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function sendQuick(text) {
            messageInput.value = text;
            sendMessage(text);
        }

        sendButton.addEventListener('click', () => sendMessage(messageInput.value));
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
    </script>
</body>
</html>
